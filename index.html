<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لعبة القسمة - بطل العدل</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #e0f7fa, #ffffff);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1 { color: #00796b; }
    .question { font-size: 24px; margin: 20px 0; }
    input {
      font-size: 20px; padding: 5px; width: 100px; text-align: center;
    }
    button {
      font-size: 18px; padding: 10px 20px; margin-top: 10px;
      background-color: #00796b; color: white; border: none; border-radius: 5px;
    }
    .feedback { font-size: 22px; margin: 15px 0; }
    .stars { font-size: 28px; color: gold; }
    .medal { font-size: 26px; color: #ff5722; margin-top: 10px; }
    .final { font-size: 30px; color: #4caf50; margin-top: 20px; animation: dance 1s infinite; }
    @keyframes dance {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      50% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }
    @media (max-width: 480px) {
      .question { font-size: 20px; }
      input { width: 80px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 لعبة القسمة - بطل العدل</h1>
    <div id="level">المستوى: سهل</div>
    <div id="timer">⏱ الوقت: ٣٠ ثانية</div>
    <div class="question" id="question"></div>
    <input type="number" id="answer" placeholder="؟">
    <br>
    <button onclick="checkAnswer()">تحقق</button>
    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars">⭐ النجوم: ٠</div>
    <div class="medal" id="medal"></div>
    <div class="final" id="final"></div>
    <audio id="successSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
    <audio id="failSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
    <audio id="clapSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>
  </div>

  <script>
    let num1, num2, correctAnswer;
    let stars = 0;
    let timeLeft = 30;
    let timer;
    let level = 1; // 1=سهل، 2=متوسط، 3=صعب

    function toEasternArabic(num) {
      return num.toString().replace(/[0-9]/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    }

    function newQuestion() {
      if (level === 1) num2 = Math.floor(Math.random() * 2) + 2;
      else if (level === 2) num2 = Math.floor(Math.random() * 2) + 4;
      else num2 = Math.floor(Math.random() * 2) + 6;

      correctAnswer = Math.floor(Math.random() * 5) + 2;
      num1 = num2 * correctAnswer;
      document.getElementById("question").innerText =
        `كم يساوي ${toEasternArabic(num1)} ÷ ${toEasternArabic(num2)} ؟`;
      document.getElementById("answer").value = "";
      document.getElementById("feedback").innerText = "";
      resetTimer();
    }

    function checkAnswer() {
      let userAnswer = parseInt(document.getElementById("answer").value);
      if (userAnswer === correctAnswer) {
        document.getElementById("feedback").innerText = "🙂 صحيح! أحسنت";
        stars++;
        document.getElementById("stars").innerText = `⭐ النجوم: ${toEasternArabic(stars)}`;
        document.getElementById("successSound").play();
        if (stars % 5 === 0) {
          document.getElementById("medal").innerText = "🏅 وسام العدل!";
          levelUp();
        }
        if (stars >= 15) {
          document.getElementById("final").innerText = "🎉 أنت بطل القسمة!";
          document.getElementById("clapSound").play();
        }
      } else {
        document.getElementById("feedback").innerText = "🙁 خطأ بسيط، أنت قادر على المحاولة من جديد!";
        document.getElementById("failSound").play();
        document.body.style.animation = "shake 0.5s";
        setTimeout(() => document.body.style.animation = "", 500);
      }
      newQuestion();
    }

    function resetTimer() {
      clearInterval(timer);
      timeLeft = 30;
      document.getElementById("timer").innerText = `⏱ الوقت: ${toEasternArabic(timeLeft)} ثانية`;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `⏱ الوقت: ${toEasternArabic(timeLeft)} ثانية`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById("feedback").innerText = "⏰ انتهى الوقت! حاول مرة أخرى.";
          newQuestion();
        }
      }, 1000);
    }

    function levelUp() {
      if (level < 3) {
        level++;
        let levelName = level === 2 ? "متوسط" : "صعب";
        document.getElementById("level").innerText = `المستوى: ${levelName}`;
      }
    }

    newQuestion();
  </script>
</body>
</html>
