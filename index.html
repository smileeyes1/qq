<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لعبة القسمة - وزّع بعدل</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #e0f7fa, #ffffff);
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      color: #00796b;
    }
    .question {
      font-size: 24px;
      margin: 20px 0;
    }
    input {
      font-size: 20px;
      padding: 5px;
      width: 100px;
      text-align: center;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin-top: 10px;
      background-color: #00796b;
      color: white;
      border: none;
      border-radius: 5px;
    }
    .feedback {
      font-size: 22px;
      margin: 15px 0;
    }
    .stars {
      font-size: 28px;
      color: gold;
    }
    @media (max-width: 480px) {
      .question { font-size: 20px; }
      input { width: 80px; }
      button { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 لعبة القسمة - وزّع بعدل</h1>
    <div id="timer">⏱ الوقت: 30 ثانية</div>
    <div class="question" id="question"></div>
    <input type="number" id="answer" placeholder="؟">
    <br>
    <button onclick="checkAnswer()">تحقق</button>
    <div class="feedback" id="feedback"></div>
    <div class="stars" id="stars">⭐ النجوم: 0</div>
  </div>

  <script>
    let num1, num2, correctAnswer;
    let stars = 0;
    let timeLeft = 30;
    let timer;

    function newQuestion() {
      num2 = Math.floor(Math.random() * 5) + 2; // المقسوم عليه بين 2 و6
      correctAnswer = Math.floor(Math.random() * 5) + 2; // الناتج بين 2 و6
      num1 = num2 * correctAnswer;
      document.getElementById("question").innerText = `كم يساوي ${num1} ÷ ${num2} ؟`;
      document.getElementById("answer").value = "";
      document.getElementById("feedback").innerText = "";
      resetTimer();
    }

    function checkAnswer() {
      let userAnswer = parseInt(document.getElementById("answer").value);
      if (userAnswer === correctAnswer) {
        document.getElementById("feedback").innerText = "🙂 صحيح! أحسنت";
        stars++;
        document.getElementById("stars").innerText = `⭐ النجوم: ${stars}`;
      } else {
        document.getElementById("feedback").innerText = "🙁 خطأ، القسمة تعني العدل!";
      }
      newQuestion();
    }

    function resetTimer() {
      clearInterval(timer);
      timeLeft = 30;
      document.getElementById("timer").innerText = `⏱ الوقت: ${timeLeft} ثانية`;
      timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = `⏱ الوقت: ${timeLeft} ثانية`;
        if (timeLeft <= 0) {
          clearInterval(timer);
          document.getElementById("feedback").innerText = "⏰ انتهى الوقت! حاول مرة أخرى.";
          newQuestion();
        }
      }, 1000);
    }

    newQuestion();
  </script>
</body>
</html>
